<script type="module">
// 1. นำเข้าฟังก์ชัน Firebase Firestore จาก CDN (v9 Modular สำหรับใช้ในเบราว์เซอร์ได้ทันที)
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  addDoc, 
  updateDoc, 
  deleteDoc, 
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// 2. ตั้งค่า Firebase Configuration (Config ประจำแอปของคุณ)
const firebaseConfig = {
  apiKey: "AIzaSyA-6vOr0_II0WepG-P9P-OgkAIK4FwA5B0",
  authDomain: "my-todo-app-1cdc5.firebaseapp.com",
  projectId: "my-todo-app-1cdc5",
  storageBucket: "my-todo-app-1cdc5.firebasestorage.app",
  messagingSenderId: "916604423532",
  appId: "1:916604423532:web:92e27af442b8c01ffeb749",
  measurementId: "G-LCRD4F6NTN"
};

// 3. เริ่มต้นระะบบ Firebase และอ้างอิงไปยังคอลเลกชัน "tasks"
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksCollection = collection(db, "tasks");

// ─── State ───────────────────────────────────────────────
// เปลี่ยนตัวแปรให้เป็น Global เพื่อให้ UI และฟังก์ชันคัดกรองอื่นๆ ยังอ้างอิงได้ปกติ
window.tasks = []; 
let currentFilter = 'all';
let currentPriority = 'all';
let currentView = 'list';
let sortMode = 'date'; 
let editingId = null;
let selectedPriority = 'high';
let detailTaskId = null;
let calYear, calMonth;

const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

const catColors = { work:'#2D5BE3', personal:'#1A7F5A', health:'#A02060', finance:'#9A6000' };
const catNames = { work:'งาน', personal:'ส่วนตัว', health:'สุขภาพ', finance:'การเงิน' };
const catIcons = { work:'💼', personal:'🏠', health:'❤️', finance:'💰' };
const priorityLabels = { high:'สำคัญมาก', med:'ปานกลาง', low:'ต่ำ' };

// ─── Firebase Sync ───
// ฟังก์ชันสำหรับดึงข้อมูลล่าสุดจาก Firebase
async function syncFromFirebase() {
  try {
    const querySnapshot = await getDocs(tasksCollection);
    const loadedTasks = [];
    querySnapshot.forEach((doc) => {
      // ดึงข้อมูลแต่ละเอกสาร มารวมกับ id ของตัวมันเองบน Firebase
      loadedTasks.push({ id: doc.id, ...doc.data() });
    });
    
    // อัปเดตไปยังตัวแปรหลัก
    window.tasks = loadedTasks;
    
    // รันฟังก์ชันคำนวณสถิติและ Badge ของแอปคุณเดิม
    updateBadges();
    updateStats();
    renderAll();
  } catch (error) {
    console.error("เกิดข้อผิดพลาดในการซิงค์ข้อมูล: ", error);
    showToast("⚠️ ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
  }
}

// ─── Filters ─────────────────────────────────────────────
function getFilteredTasks() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const todayStr = today.toISOString().split('T')[0];
  const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekStr = weekEnd.toISOString().split('T')[0];

  return window.tasks.filter(t => {
    if (search && !t.title.toLowerCase().includes(search) && !t.note.toLowerCase().includes(search)) return false;
    if (currentPriority !== 'all' && t.priority !== currentPriority) return false;
    if (currentFilter === 'today') return t.due === todayStr && !t.done;
    if (currentFilter === 'week') return t.due >= todayStr && t.due <= weekStr && !t.done;
    if (currentFilter === 'important') return t.priority === 'high' && !t.done;
    if (currentFilter === 'done') return t.done;
    if (currentFilter === 'cat-work') return t.cat === 'work' && !t.done;
    if (currentFilter === 'cat-personal') return t.cat === 'personal' && !t.done;
    if (currentFilter === 'cat-health') return t.cat === 'health' && !t.done;
    if (currentFilter === 'cat-finance') return t.cat === 'finance' && !t.done;
    return true;
  }).sort((a, b) => {
    if (sortMode === 'priority') {
      const p = {high:0, med:1, low:2};
      return p[a.priority] - p[b.priority];
    }
    if (sortMode === 'name') return a.title.localeCompare(b.title, 'th');
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1; if (b.due) return 1;
    return b.created - a.created;
  });
}

// ─── Render ───────────────────────────────────────────────
function renderAll() {
  if (currentView === 'list') renderList();
  else if (currentView === 'kanban') renderKanban();
  else renderCalendar();
}

function renderList() {
  const filtered = getFilteredTasks();
  const container = document.getElementById('task-list-container');
  const todayStr = today.toISOString().split('T')[0];

  const overdue = filtered.filter(t => !t.done && t.due && t.due < todayStr);
  const dueToday = filtered.filter(t => !t.done && t.due === todayStr);
  const upcoming = filtered.filter(t => !t.done && (!t.due || t.due > todayStr));
  const done = filtered.filter(t => t.done);

  let html = '';

  if (currentFilter === 'done') {
    html += renderSection('เสร็จแล้วทั้งหมด', done, '#1A7F5A');
  } else {
    if (overdue.length) html += renderSection('เลยกำหนด', overdue, '#C0392B');
    if (dueToday.length) html += renderSection('ครบกำหนดวันนี้', dueToday, '#9A6000');
    if (upcoming.length) html += renderSection('กำลังดำเนินการ', upcoming, '#6B6560');
    if (done.length && currentFilter === 'all') html += renderSection('เสร็จแล้ว', done.slice(0,5), '#1A7F5A');
  }

  if (!filtered.length) {
    html = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1" ry="1"/></svg><p>ไม่มี task ในหมวดนี้</p></div>`;
  }

  html += `<button class="add-task-btn" onclick="openModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>เพิ่ม task ใหม่...</button>`;

  container.innerHTML = html;
}

function renderSection(title, taskList, color) {
  if (!taskList.length) return '';
  const tasks_html = taskList.map(renderTaskCard).join('');
  return `<div class="task-section">
    <div class="section-hd">
      <div class="section-hd-title" style="color:${color};">${title}</div>
      <div class="section-hd-count">${taskList.length}</div>
      <div class="section-line"></div>
    </div>
    <div class="tasks">${tasks_html}</div>
  </div>`;
}

function renderTaskCard(t) {
  const todayStr = today.toISOString().split('T')[0];
  const isOverdue = !t.done && t.due && t.due < todayStr;
  const dueClass = isOverdue ? 'overdue' : '';
  const dueLabel = t.due ? formatDate(t.due) : '';
  const checkClass = t.done ? 'checked' : '';
  return `<div class="task-card ${t.done ? 'done-card' : ''}" onclick="openDetail('${t.id}')">
    <div class="task-check ${checkClass}" onclick="event.stopPropagation();toggleDone('${t.id}')">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="task-body">
      <div class="task-title ${t.done ? 'done-text' : ''}">${t.title}</div>
      <div class="task-meta">
        <span class="priority-tag ${t.priority}">${priorityLabels[t.priority]}</span>
        <span class="cat-tag"><span class="dot" style="background:${catColors[t.cat]};"></span>${catIcons[t.cat]} ${catNames[t.cat]}</span>
        ${dueLabel ? `<span class="due-tag ${dueClass}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dueLabel}</span>` : ''}
        ${t.note ? `<span class="note-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>มีโน้ต</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <div class="icon-btn" onclick="event.stopPropagation();openEditModal('${t.id}')" title="แก้ไข">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <div class="icon-btn" onclick="event.stopPropagation();deleteTask('${t.id}')" title="ลบ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </div>
    </div>
  </div>`;
}

function renderKanban() {
  const cols = [
    { key: 'todo', label: 'รอดำเนินการ', color: '#6B6560', filter: t => !t.done && t.priority !== 'high' },
    { key: 'high', label: 'สำคัญมาก', color: '#C0392B', filter: t => !t.done && t.priority === 'high' },
    { key: 'done', label: 'เสร็จแล้ว', color: '#1A7F5A', filter: t => t.done },
  ];
  const search = document.getElementById('search-input').value.toLowerCase();
  const all = window.tasks.filter(t => !search || t.title.toLowerCase().includes(search));

  const container = document.getElementById('kanban-container');
  container.innerHTML = cols.map(col => {
    const colTasks = all.filter(col.filter);
    const cards = colTasks.map(t => `<div class="kan-card" onclick="openDetail('${t.id}')">
      <div class="kan-card-title">${t.title}</div>
      <div class="kan-card-meta">
        <span class="priority-tag ${t.priority}" style="font-size:10.5px;">${priorityLabels[t.priority]}</span>
        <span class="cat-tag" style="font-size:10.5px;">${catIcons[t.cat]} ${catNames[t.cat]}</span>
        ${t.due ? `<span class="due-tag" style="font-size:10.5px;">${formatDate(t.due)}</span>` : ''}
      </div>
    </div>`).join('');
    return `<div class="kan-col">
      <div class="kan-col-hd">
        <div class="kan-col-title"><div class="kan-dot" style="background:${col.color};"></div>${col.label}</div>
        <div class="kan-count">${colTasks.length}</div>
      </div>
      <div class="kan-tasks">${cards || '<div style="font-size:12px;color:var(--text3);padding:8px 0;">ว่าง</div>'}</div>
      <div class="kan-add" onclick="openModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>เพิ่ม</div>
    </div>`;
  }).join('');
}

function renderCalendar() {
  const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const thDays = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  document.getElementById('cal-title').textContent = `${thMonths[calMonth]} ${calYear + 543}`;

  const grid = document.getElementById('cal-grid');
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = today.toISOString().split('T')[0];

  let html = thDays.map(d => `<div class="cal-header">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day other-month"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const dayTasks = window.tasks.filter(t => t.due === dateStr && !t.done);
    const dots = dayTasks.slice(0,2).map(t => `<div class="cal-task-dot ${t.priority==='high'?'high-dot':''}" onclick="openDetail('${t.id}')">${t.title.slice(0,10)}${t.title.length>10?'…':''}</div>`).join('');
    html += `<div class="cal-day ${isToday?'today':''}">
      <div class="cal-day-num">${d}</div>
      ${dots}
      ${dayTasks.length>2?`<div style="font-size:10px;color:var(--text3);">+${dayTasks.length-2} อื่นๆ</div>`:''}
    </div>`;
  }
  grid.innerHTML = html;
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

// ─── Stats & Badges ───────────────────────────────────────
function updateStats() {
  const todayStr = today.toISOString().split('T')[0];
  const total = window.tasks.filter(t => !t.done).length;
  const todayCount = window.tasks.filter(t => t.due === todayStr && !t.done).length;
  const doneWeek = window.tasks.filter(t => t.done).length;
  const totalAll = window.tasks.length;
  const pct = totalAll ? Math.round((doneWeek/totalAll)*100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-done').textContent = doneWeek;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-txt').textContent = `${doneWeek} / ${totalAll}`;
}

function updateBadges() {
  const todayStr = today.toISOString().split('T')[0];
  const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekStr = weekEnd.toISOString().split('T')[0];
  document.getElementById('badge-all').textContent = window.tasks.filter(t=>!t.done).length;
  document.getElementById('badge-today').textContent = window.tasks.filter(t=>t.due===todayStr&&!t.done).length;
  document.getElementById('badge-week').textContent = window.tasks.filter(t=>t.due>=todayStr&&t.due<=weekStr&&!t.done).length;
  document.getElementById('badge-important').textContent = window.tasks.filter(t=>t.priority==='high'&&!t.done).length;
  document.getElementById('badge-done').textContent = window.tasks.filter(t=>t.done).length;
  document.getElementById('badge-cat-work').textContent = window.tasks.filter(t=>t.cat==='work'&&!t.done).length;
  document.getElementById('badge-cat-personal').textContent = window.tasks.filter(t=>t.cat==='personal'&&!t.done).length;
  document.getElementById('badge-cat-health').textContent = window.tasks.filter(t=>t.cat==='health'&&!t.done).length;
  document.getElementById('badge-cat-finance').textContent = window.tasks.filter(t=>t.cat==='finance'&&!t.done).length;
}

// ─── Actions Firebase ─────────────────────────────────────
async function toggleDone(id) {
  const t = window.tasks.find(x => x.id === id);
  if (!t) return;
  
  try {
    const taskDocRef = doc(db, "tasks", id);
    await updateDoc(taskDocRef, { done: !t.done });
    
    showToast(!t.done ? '✓ ทำเสร็จแล้ว!' : 'ยังไม่เสร็จ');
    await syncFromFirebase(); // โหลดข้อมูลสดใหม่จากเซิร์ฟเวอร์
    if (detailTaskId === id) openDetail(id);
  } catch (error) {
    console.error("ผิดพลาด: ", error);
    showToast("⚠️ ไม่สามารถอัปเดตสถานะได้");
  }
}

async function deleteTask(id) {
  try {
    const taskDocRef = doc(db, "tasks", id);
    await deleteDoc(taskDocRef);
    
    if (detailTaskId === id) closeDetail();
    showToast('ลบ task แล้ว');
    await syncFromFirebase();
  } catch (error) {
    console.error("ผิดพลาด: ", error);
    showToast("⚠️ ไม่สามารถลบทาสก์ได้");
  }
}

// ─── Modal ────────────────────────────────────────────────
function openModal() {
  editingId = null;
  document.getElementById('modal-title-text').textContent = 'เพิ่ม Task ใหม่';
  document.getElementById('form-title').value = '';
  document.getElementById('form-note').value = '';
  document.getElementById('form-due').value = '';
  document.getElementById('form-cat').value = 'work';
  selectPriority('high');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('form-title').focus(), 100);
}

function openEditModal(id) {
  const t = window.tasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title-text').textContent = 'แก้ไข Task';
  document.getElementById('form-title').value = t.title;
  document.getElementById('form-note').value = t.note;
  document.getElementById('form-due').value = t.due || '';
  document.getElementById('form-cat').value = t.cat;
  selectPriority(t.priority);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId = null; }
function closeModalOutside(e) { if (e.target.id === 'modal-overlay') closeModal(); }

function selectPriority(p) {
  selectedPriority = p;
  document.querySelectorAll('.priority-pill').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.priority-pill.${p}`).classList.add('selected');
}

async function saveTask() {
  const title = document.getElementById('form-title').value.trim();
  if (!title) { document.getElementById('form-title').focus(); return; }
  
  // บรรจุข้อมูลวัตถุ
  const taskData = {
    title,
    priority: selectedPriority,
    cat: document.getElementById('form-cat').value,
    due: document.getElementById('form-due').value,
    note: document.getElementById('form-note').value.trim(),
    done: editingId ? (window.tasks.find(t=>t.id===editingId)||{}).done||false : false,
    created: editingId ? (window.tasks.find(t=>t.id===editingId)||{}).created||Date.now() : Date.now()
  };

  try {
    if (editingId) {
      // แก้ไขเอกสารตัวเดิมบน Firebase
      const taskDocRef = doc(db, "tasks", editingId);
      await updateDoc(taskDocRef, taskData);
      showToast('✓ แก้ไขแล้ว');
    } else {
      // เพิ่มเอกสารอันใหม่เข้าไปยังคอลเลกชันใน Firebase
      await addDoc(tasksCollection, taskData);
      showToast('✓ เพิ่ม task แล้ว');
    }
    
    closeModal();
    await syncFromFirebase();
  } catch (error) {
    console.error("ผิดพลาดในการบันทึก: ", error);
    showToast("⚠️ บันทึกข้อมูลไม่สำเร็จ");
  }
}

// ─── Detail panel ─────────────────────────────────────────
function openDetail(id) {
  const t = window.tasks.find(x => x.id === id);
  if (!t) return;
  detailTaskId = id;
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');
  document.getElementById('detail-title').textContent = t.title;
  const todayStr = today.toISOString().split('T')[0];
  const isOverdue = !t.done && t.due && t.due < todayStr;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-label">ระดับความสำคัญ</div>
      <span class="priority-tag ${t.priority}">${priorityLabels[t.priority]}</span>
    </div>
    <div class="detail-section" style="margin-top:12px;">
      <div class="detail-label">หมวดหมู่</div>
      <div class="detail-val">${catIcons[t.cat]} ${catNames[t.cat]}</div>
    </div>
    ${t.due ? `<div class="detail-section" style="margin-top:12px;">
      <div class="detail-label">วันครบกำหนด</div>
      <div class="detail-val" style="${isOverdue?'color:var(--red);':''}">${formatDate(t.due)}${isOverdue?' (เลยกำหนด)':''}</div>
    </div>` : ''}
    ${t.note ? `<div class="detail-section" style="margin-top:12px;">
      <div class="detail-label">หมายเหตุ</div>
      <div class="detail-note">${t.note}</div>
    </div>` : ''}
    <div style="margin-top:12px; display:flex; gap:8px;">
      <button class="btn-ghost" style="flex:1; font-size:13px;" onclick="openEditModal('${t.id}')">แก้ไข</button>
    </div>
  `;
  const doneBtn = document.getElementById('detail-done-btn');
  document.getElementById('detail-done-label').textContent = t.done ? 'ยังไม่เสร็จ' : 'ทำเสร็จแล้ว';
  doneBtn.style.background = t.done ? 'var(--surface2)' : 'var(--green-bg)';
  doneBtn.style.color = t.done ? 'var(--text2)' : 'var(--green)';
  doneBtn.style.borderColor = t.done ? 'var(--border)' : 'var(--green)';
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden');
  detailTaskId = null;
}

function toggleDoneDetail() {
  if (detailTaskId) { toggleDone(detailTaskId); }
}

function deleteDetail() {
  if (detailTaskId) deleteTask(detailTaskId);
}

// ─── UI helpers ───────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  const titles = {all:'ทุก Tasks', today:'วันนี้', week:'สัปดาห์นี้', important:'สำคัญ', done:'เสร็จแล้ว', 'cat-work':'งาน', 'cat-personal':'ส่วนตัว', 'cat-health':'สุขภาพ', 'cat-finance':'การเงิน'};
  document.getElementById('page-title').textContent = titles[f] || 'Tasks';
  renderAll();
}

function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('list-view').style.display = v==='list' ? '' : 'none';
  document.getElementById('kanban-view').style.display = v==='kanban' ? '' : 'none';
  document.getElementById('calendar-view').style.display = v==='calendar' ? '' : 'none';
  renderAll();
}

function setPriority(p, el) {
  currentPriority = p;
  document.querySelectorAll('#priority-chips .chip').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function toggleSort() {
  const modes = ['date','priority','name'];
  const labels = {date:'วันที่', priority:'ความสำคัญ', name:'ชื่อ'};
  sortMode = modes[(modes.indexOf(sortMode)+1) % modes.length];
  document.getElementById('sort-label').textContent = 'เรียงตาม: ' + labels[sortMode];
  renderAll();
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  const todayStr = today.toISOString().split('T')[0];
  if (str === todayStr) return 'วันนี้';
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
  if (str === tomorrow.toISOString().split('T')[0]) return 'พรุ่งนี้';
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Date display ─────────────────────────────────────────
function initDate() {
  const thDays = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  document.getElementById('page-date').textContent = `วัน${thDays[today.getDay()]}ที่ ${today.getDate()} ${thMonths[today.getMonth()]} ${today.getFullYear()+543}`;
}

// ─── Keyboard ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeDetail(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'TEXTAREA') saveTask();
  }
});

// ผูกฟังก์ชันเข้ากับอ็อบเจกต์ window เพื่อให้แท็ก HTML ภายนอกเรียกใช้งานผ่าน onclick="" ได้ปกติ
window.setFilter = setFilter;
window.setView = setView;
window.setPriority = setPriority;
window.toggleSort = toggleSort;
window.calPrev = calPrev;
window.calNext = calNext;
window.openModal = openModal;
window.openEditModal = openEditModal;
window.closeModal = closeModal;
window.closeModalOutside = closeModalOutside;
window.selectPriority = selectPriority;
window.saveTask = saveTask;
window.openDetail = openDetail;
window.closeDetail = closeDetail;
window.toggleDoneDetail = toggleDoneDetail;
window.deleteDetail = deleteDetail;
window.toggleDone = toggleDone;
window.deleteTask = deleteTask;

// ─── Init ─────────────────────────────────────────────────
initDate();
// ทำการดึงข้อมูลสดจากเซิร์ฟเวอร์ Firebase ตั้งแต่เริ่มต้นเปิดแอป
syncFromFirebase();
</script>
